---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: color-gw
  namespace: handson
spec:
  gatewayClassName: cilium
  listeners:
  - protocol: HTTP
    port: 80
    name: web-gw-color
    hostname: app.example.com
    allowedRoutes:
      namespaces:
        from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: color-route-1
  namespace: handson
spec:
  parentRefs:
  - name: color-gw
  hostnames:
  - app.example.com
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - kind: Service
      name: handson
      port: 8080