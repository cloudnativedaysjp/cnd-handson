apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: app-route-weight
  namespace: envoy-gateway-handson
spec:
  parentRefs:
    - name: eg
  hostnames:
    - "app.envoy-gateway.example.com"
  rules:
    - backendRefs:
        - name: app-v1
          port: 8080
          weight: 80
        - name: app-v2
          port: 8080
          weight: 20
      matches:
        - path:
            type: PathPrefix
            value: /
