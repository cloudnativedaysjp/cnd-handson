apiVersion: v1
kind: Namespace
metadata:
  name: envoy-gateway-handson
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-v1
  namespace: envoy-gateway-handson
  labels:
    app: demo
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo
      version: v1
  template:
    metadata:
      labels:
        app: demo
        version: v1
    spec:
      containers:
        - name: app
          image: hashicorp/http-echo:0.2.3
          args:
            - "-text=Hello from v1"
            - "-listen=:8080"
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: app-v1
  namespace: envoy-gateway-handson
  labels:
    app: demo
    version: v1
spec:
  selector:
    app: demo
    version: v1
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-v2
  namespace: envoy-gateway-handson
  labels:
    app: demo
    version: v2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo
      version: v2
  template:
    metadata:
      labels:
        app: demo
        version: v2
    spec:
      containers:
        - name: app
          image: hashicorp/http-echo:0.2.3
          args:
            - "-text=Hello from v2"
            - "-listen=:8080"
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: app-v2
  namespace: envoy-gateway-handson
  labels:
    app: demo
    version: v2
spec:
  selector:
    app: demo
    version: v2
  ports:
    - port: 8080
      targetPort: 8080
